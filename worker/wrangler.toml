# name must match the Worker created in the Cloudflare dashboard / Workers Builds project.
name = "bigfleet-demo"
main = "src/index.ts"
compatibility_date = "2025-07-18"

# Runner base URLs — each a demohost daemon behind an HTTPS tunnel. Replace with your real
# runner(s); leaving the placeholder deploys fine but the worker has no capacity to assign.
# Entries may be strings or { "url": "...", "name": "..." } objects.
[vars]
RUNNERS = '["https://r1.bigfleet-demo.lucy.sh"]'

# KV: ip -> session assignment (auto-expires at session end). REQUIRED — the build FAILS until
# `id` is a real namespace id from YOUR account. Create it once:
#   npx wrangler kv namespace create SESSIONS      # -> prints the id; paste it below
# preview_id is only used by remote `wrangler dev`; local dev simulates KV, so it can stay as-is.
[[kv_namespaces]]
binding = "SESSIONS"
id = "1bc60c4b633d4655ae3450ca8ac5aafb"
preview_id = "1bc60c4b633d4655ae3450ca8ac5aafb"

# Bind the worker to the public hostname (after the lucy.sh zone + DNS record exist).
# Uncomment and set your zone:
# [[routes]]
# pattern = "bigfleet-demo-api.lucy.sh/*"
# zone_name = "lucy.sh"

# DEMOHOST_KEY is a SECRET — never in this file. Set it with:
#   npx wrangler secret put DEMOHOST_KEY     # paste the contents of ../secrets/demohost.key
# For `wrangler dev`, put DEMOHOST_KEY (and a localhost RUNNERS override) in worker/.dev.vars
